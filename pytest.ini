[pytest]
testpaths = tests
# Project-local basetemp avoids a Windows teardown crash cleaning the shared
# %TEMP%\pytest-of-* "pytest-current" symlink.
addopts = -q --basetemp=.pytest_tmp
# test_e2e.py is a manual integration script (opens a window, hits the network);
# it is intentionally excluded from the unit run via testpaths above.
